<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYL AI 履歷與職缺媒合分析系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getDatabase, ref, get, set, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQ51wpt_kILP59ILdv1HS0WewRDrMb33Q",
            authDomain: "interview-master-37f6b.firebaseapp.com",
            databaseURL: "https://interview-master-37f6b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "interview-master-37f6b",
            storageBucket: "interview-master-37f6b.firebasestorage.app",
            messagingSenderId: "691393384741",
            appId: "1:691393384741:web:635cfb077f4604c14f8acc",
            measurementId: "G-NJSRLR9RLX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // 開發者白名單（無限次使用）
        const DEV_EMAILS = ['aylautoyourlife456789@gmail.com'];
        const isDevUser = (email) => DEV_EMAILS.includes(email);

        // 監聯登入狀態
        onAuthStateChanged(auth, (user) => {
            const loginSection = document.getElementById('loginSection');
            const appSection = document.getElementById('appSection');
            const userInfo = document.getElementById('userInfo');
            const userEmail = document.getElementById('userEmail');
            const usageCount = document.getElementById('usageCount');

            if (user) {
                // 只允許 Gmail
                if (!user.email.endsWith('@gmail.com')) {
                    signOut(auth);
                    alert('僅限 Gmail 帳號登入');
                    return;
                }
                loginSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                userInfo.classList.remove('hidden');
                userEmail.textContent = user.email;

                // 讀取使用次數
                const usageRef = ref(db, 'usage/' + user.uid);
                get(usageRef).then((snapshot) => {
                    const count = snapshot.exists() ? snapshot.val().count || 0 : 0;
                    if (isDevUser(user.email)) {
                        usageCount.textContent = `開發者 (無限次)`;
                        usageCount.classList.add('text-emerald-400');
                    } else {
                        usageCount.textContent = `已使用 ${count} / 3 次`;
                        if (count >= 3) {
                            usageCount.classList.add('text-red-400');
                        }
                    }
                });

                // 載入歷史紀錄
                setTimeout(() => window.loadHistory(), 300);
            } else {
                loginSection.classList.remove('hidden');
                appSection.classList.add('hidden');
                userInfo.classList.add('hidden');
            }
        });

        // 登入
        window.loginWithGmail = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    alert('登入失敗：' + err.message);
                }
            }
        };

        // 登出
        window.logoutUser = () => signOut(auth);

        // 檢查配額（不扣次數，供送出前呼叫）
        window.checkQuota = async () => {
            const user = auth.currentUser;
            if (!user) return false;

            const usageRef = ref(db, 'usage/' + user.uid);
            const snapshot = await get(usageRef);
            const count = snapshot.exists() ? snapshot.val().count || 0 : 0;

            if (count >= 3 && !isDevUser(user.email)) {
                alert('您的帳號已使用 3 次，已達上限。');
                return false;
            }
            return { count };
        };

        // 扣次數並建立歷史紀錄（僅在 n8n 成功回傳有效結果後呼叫）
        window.consumeQuota = async (count, results, reportUrl) => {
            const user = auth.currentUser;
            if (!user) return null;

            const jobTitle = document.getElementById('jobTitle').value.trim();
            const seniorityLevel = document.getElementById('seniorityLevel').value;

            await set(ref(db, 'usage/' + user.uid + '/count'), count + 1);
            await set(ref(db, 'usage/' + user.uid + '/email'), user.email);

            const newRef = push(ref(db, 'usage/' + user.uid + '/history'));
            const entry = {
                jobTitle,
                seniorityLevel,
                timestamp: new Date().toISOString(),
                results
            };
            if (reportUrl) entry.reportUrl = reportUrl;
            await set(newRef, entry);

            if (isDevUser(user.email)) {
                document.getElementById('usageCount').textContent = `開發者 (無限次)`;
            } else {
                document.getElementById('usageCount').textContent = `已使用 ${count + 1} / 3 次`;
                if (count + 1 >= 3) {
                    document.getElementById('usageCount').classList.add('text-red-400');
                }
            }
            return newRef.key;
        };

        // 載入歷史紀錄
        window.loadHistory = async () => {
            const user = auth.currentUser;
            if (!user) return;

            const historyRef = ref(db, 'usage/' + user.uid + '/history');
            const snapshot = await get(historyRef);

            const container = document.getElementById('historyList');
            const section = document.getElementById('historySection');

            if (!snapshot.exists()) {
                container.innerHTML = '<p class="text-neutral-500 text-sm text-center py-4">尚無使用紀錄</p>';
                section.classList.remove('hidden');
                return;
            }

            const entries = [];
            snapshot.forEach((child) => {
                entries.push({ key: child.key, ...child.val() });
            });
            entries.reverse(); // 最新的在前

            container.innerHTML = entries.map((entry, idx) => {
                const date = new Date(entry.timestamp).toLocaleString('zh-TW');
                const hasResults = !!entry.results;
                return `
                <div class="border border-neutral-800 rounded-lg overflow-hidden">
                    <button onclick="toggleHistoryDetail('${entry.key}')"
                        class="w-full flex items-center justify-between px-4 py-3 hover:bg-neutral-800/50 transition-colors text-left">
                        <div class="min-w-0">
                            <p class="text-sm font-medium text-white truncate">${entry.jobTitle || 'N/A'}</p>
                            <p class="text-xs text-neutral-500 mt-0.5">${entry.seniorityLevel || ''} · ${date}</p>
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0 ml-2">
                            ${hasResults
                        ? '<span class="text-xs text-emerald-400">有結果</span>'
                        : '<span class="text-xs text-neutral-600">處理中</span>'}
                            <svg class="w-4 h-4 text-neutral-500 transition-transform" id="chevron-${entry.key}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </button>
                    <div id="detail-${entry.key}" class="hidden px-4 pb-4">
                        ${hasResults ? '<div id="historyResults-' + entry.key + '"></div>' : '<p class="text-neutral-500 text-sm">此筆紀錄無分析結果</p>'}
                    </div>
                </div>`;
            }).join('');

            // 預先存好結果資料供展開時渲染
            window._historyData = {};
            entries.forEach(e => {
                if (e.results) window._historyData[e.key] = { results: e.results, reportUrl: e.reportUrl || null };
            });

            section.classList.remove('hidden');
        };

        // 展開/收合歷史紀錄
        window.toggleHistoryDetail = (key) => {
            const detail = document.getElementById('detail-' + key);
            const chevron = document.getElementById('chevron-' + key);
            const isHidden = detail.classList.contains('hidden');

            detail.classList.toggle('hidden');
            chevron.style.transform = isHidden ? 'rotate(180deg)' : '';

            // 首次展開時渲染結果卡片
            const resultsContainer = document.getElementById('historyResults-' + key);
            if (isHidden && resultsContainer && resultsContainer.innerHTML === '' && window._historyData[key]) {
                const { results } = window._historyData[key];
                const arr = Array.isArray(results) ? results : [results];
                resultsContainer.innerHTML = arr.map((item, idx) => {
                    const num = parseInt(item.fit_score) || 0;
                    const badgeColor = num >= 7 ? 'bg-emerald-900/50 border-emerald-700 text-emerald-300'
                        : num >= 5 ? 'bg-yellow-900/50 border-yellow-700 text-yellow-300'
                            : 'bg-red-900/50 border-red-700 text-red-300';
                    const keywords = (item.keywords || []).map(k => '<span class="inline-block bg-neutral-800 border border-neutral-700 text-neutral-400 text-xs px-2 py-1 rounded-md">' + k + '</span>').join('');
                    const questions = (item.interview_q || '').split(/\n/).filter(q => q.trim()).map(q => '<li class="text-neutral-300">' + q.replace(/^\d+\.\s*/, '') + '</li>').join('');
                    return '<div class="bg-neutral-900 border border-neutral-800 rounded-lg p-4 mt-3 space-y-3">'
                        + '<div class="flex items-center justify-between"><span class="text-sm font-bold text-white">' + (item.title || '#' + (idx + 1)) + '</span><span class="border rounded px-2 py-1 text-xs font-bold ' + badgeColor + '">' + (item.fit_score || 'N/A') + '</span></div>'
                        + '<p class="text-xs text-neutral-400">' + (item.companyName || '') + '</p>'
                        + '<div><p class="text-xs text-neutral-500 font-semibold mb-1">匹配關鍵字</p><div class="flex flex-wrap gap-1">' + (keywords || '<span class="text-neutral-600 text-xs">N/A</span>') + '</div></div>'
                        + '<div><p class="text-xs text-neutral-500 font-semibold mb-1">缺乏經驗</p><p class="text-xs text-neutral-300">' + (item.lack_exp || 'N/A') + '</p></div>'
                        + '<div><p class="text-xs text-neutral-500 font-semibold mb-1">補足建議</p><p class="text-xs text-neutral-300">' + (item.improvement || 'N/A') + '</p></div>'
                        + '<div><p class="text-xs text-neutral-500 font-semibold mb-1">預測面試題目</p><ol class="list-decimal list-inside text-xs space-y-1">' + (questions || '<li class="text-neutral-600">N/A</li>') + '</ol></div>'
                        + '<div class="bg-black/50 rounded p-3"><p class="text-xs text-neutral-500 font-semibold mb-1">綜合建議</p><p class="text-xs text-neutral-200">' + (item.final_advice || 'N/A') + '</p></div>'
                        + '</div>';
                }).join('');
            }
        };
    </script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #050505;
            color: #ffffff;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 selection:bg-white selection:text-black">

    <!-- 登入畫面 -->
    <div id="loginSection"
        class="w-full max-w-lg bg-neutral-900 border border-neutral-800 rounded-2xl p-8 shadow-2xl text-center">
        <div
            class="w-24 h-24 mx-auto mb-4 rounded-full bg-black border border-neutral-800 flex items-center justify-center overflow-hidden shadow-lg">
            <img src="649237465_17941335120152572_4383591875688593178_n.jpg" alt="AYL Logo"
                class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100/111/fff?text=AYL'">
        </div>
        <h1 class="text-2xl font-bold tracking-wider mb-2">AI 履歷分析系統</h1>
        <p class="text-neutral-400 text-sm mb-8">請使用 Gmail 帳號登入以開始使用</p>
        <button onclick="loginWithGmail()"
            class="inline-flex items-center gap-3 bg-white text-black font-semibold py-3 px-6 rounded-lg hover:bg-neutral-200 transition-all duration-200">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            使用 Gmail 登入
        </button>
        <p class="text-neutral-600 text-xs mt-4">每個帳號可免費使用 3 次</p>
    </div>

    <!-- 主應用程式（登入後顯示） -->
    <main id="appSection"
        class="hidden w-full max-w-lg bg-neutral-900 border border-neutral-800 rounded-2xl p-8 shadow-2xl relative overflow-hidden">

        <!-- 使用者資訊列 -->
        <div id="userInfo"
            class="hidden flex items-center justify-between mb-4 pb-4 border-b border-neutral-800 relative z-10">
            <div class="flex items-center gap-2 min-w-0">
                <div class="w-2 h-2 rounded-full bg-emerald-500 flex-shrink-0"></div>
                <span id="userEmail" class="text-xs text-neutral-400 truncate"></span>
                <span class="text-neutral-600 text-xs">|</span>
                <span id="usageCount" class="text-xs text-neutral-400"></span>
            </div>
            <button onclick="logoutUser()"
                class="text-xs text-neutral-500 hover:text-white transition-colors flex-shrink-0 ml-2">登出</button>
        </div>

        <div
            class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-24 bg-white/5 blur-3xl rounded-full pointer-events-none">
        </div>

        <div class="text-center mb-8 relative z-10">
            <div
                class="w-24 h-24 mx-auto mb-4 rounded-full bg-black border border-neutral-800 flex items-center justify-center overflow-hidden shadow-lg">
                <img src="649237465_17941335120152572_4383591875688593178_n.jpg" alt="AYL Logo"
                    class="w-full h-full object-cover"
                    onerror="this.src='https://placehold.co/100x100/111/fff?text=AYL'">
            </div>
            <h1 class="text-2xl font-bold tracking-wider">AI 履歷分析系統</h1>
            <p class="text-neutral-400 text-sm mt-2">上傳履歷與目標職缺，自動生成專業評估報告</p>
        </div>

        <form id="analysisForm" class="space-y-6 relative z-10" novalidate>

            <!-- 1. Job Title -->
            <div class="space-y-2">
                <label for="jobTitle" class="block text-sm font-medium text-neutral-300">目標職缺名稱 <span
                        class="text-red-500">*</span></label>
                <input type="text" id="jobTitle" name="jobTitle" required maxlength="50"
                    placeholder="請輸入目標職缺，如：Sales, Data Engineer, 產品經理..."
                    class="w-full bg-black border border-neutral-700 rounded-lg px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-colors">
                <p id="jobTitleError" class="hidden text-xs text-red-400 mt-1"></p>
            </div>

            <!-- 2. Seniority Level -->
            <div class="space-y-2">
                <label for="seniorityLevel" class="block text-sm font-medium text-neutral-300">預期資歷層級 <span
                        class="text-red-500">*</span></label>
                <div class="relative">
                    <select id="seniorityLevel" name="seniorityLevel" required
                        class="w-full bg-black border border-neutral-700 rounded-lg px-4 py-3 text-white appearance-none focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-colors cursor-pointer">
                        <option value="" disabled selected class="text-neutral-600">請選擇對應的資歷層級</option>
                        <option value="Internship">實習 (Internship)</option>
                        <option value="Entry level">初階 (Entry level)</option>
                        <option value="Associate">專員/副理 (Associate)</option>
                        <option value="Mid-Senior level">中高階 (Mid-Senior level)</option>
                        <option value="Director">總監/處長 (Director)</option>
                        <option value="Executive">高階主管 (Executive)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-neutral-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </div>
                </div>
                <p id="seniorityError" class="hidden text-xs text-red-400 mt-1"></p>
            </div>

            <!-- 3. Resume Upload -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-neutral-300">上傳個人履歷 <span
                        class="text-red-500">*</span></label>
                <label id="dropZone" for="resumeFile"
                    class="flex flex-col items-center justify-center w-full h-32 border-2 border-neutral-700 border-dashed rounded-lg cursor-pointer bg-black/50 hover:bg-black hover:border-neutral-500 transition-all duration-300 group">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <svg class="w-8 h-8 mb-3 text-neutral-500 group-hover:text-white transition-colors" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                            </path>
                        </svg>
                        <p class="mb-1 text-sm text-neutral-400 group-hover:text-neutral-300"><span
                                class="font-semibold">點擊上傳</span> 或拖曳檔案至此</p>
                        <p class="text-xs text-neutral-600">支援 PDF, DOC, DOCX (最大 5MB)</p>
                    </div>
                    <input id="resumeFile" name="resumeFile" type="file" accept=".pdf,.doc,.docx" />
                </label>

                <div id="fileInfo"
                    class="hidden items-center justify-between mt-2 p-3 bg-neutral-800 rounded-md border border-neutral-700">
                    <div class="flex items-center space-x-2 overflow-hidden">
                        <svg class="w-5 h-5 text-neutral-400 flex-shrink-0" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        <span id="fileName" class="text-sm text-neutral-300 truncate">filename.pdf</span>
                    </div>
                    <button type="button" id="removeFileBtn"
                        class="text-neutral-500 hover:text-white transition-colors p-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <p id="fileError" class="hidden text-xs text-red-400 mt-1"></p>
            </div>

            <!-- Status Message -->
            <div id="statusMessage" class="hidden rounded-lg p-4 text-sm text-center border"></div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" disabled
                class="w-full flex items-center justify-center bg-white text-black font-semibold py-3 px-4 rounded-lg hover:bg-neutral-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-black focus:ring-white transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-white">
                <span id="btnText">開始 AI 分析並下載報告</span>
                <svg id="btnLoader" class="hidden animate-spin ml-2 h-5 w-5 text-black"
                    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
            </button>
        </form>

        <!-- Results Section (hidden until data arrives) -->
        <div id="resultsSection" class="hidden mt-8 relative z-10">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-white">分析結果</h2>
                <button id="downloadReportBtn"
                    class="hidden flex items-center gap-2 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 text-white text-sm font-medium py-2 px-4 rounded-lg transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg>
                    下載完整報告
                </button>
            </div>
            <div id="resultsCards" class="space-y-4"></div>
        </div>

        <!-- 歷史紀錄 -->
        <div id="historySection" class="hidden mt-8 relative z-10">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-white">過往紀錄</h2>
                <button onclick="loadHistory()"
                    class="text-xs text-neutral-500 hover:text-white transition-colors">重新整理</button>
            </div>
            <div id="historyList" class="space-y-2"></div>
        </div>
    </main>

    <script>
        // ===== Configuration =====
        const DEV_MODE = false;
        const N8N_WEBHOOK_URL = DEV_MODE
            ? 'https://myfirstn8nproject.zeabur.app/webhook-test/ffe8d4d1-8a07-4ce7-8b02-49cea433a598'
            : 'https://myfirstn8nproject.zeabur.app/webhook/ffe8d4d1-8a07-4ce7-8b02-49cea433a598';
        const API_TIMEOUT_MS = 900000; // 15 minutes (scrapper + LLM processing)

        document.addEventListener('DOMContentLoaded', () => {
            // ----- DOM refs -----
            const form = document.getElementById('analysisForm');
            const jobTitle = document.getElementById('jobTitle');
            const seniority = document.getElementById('seniorityLevel');
            const fileInput = document.getElementById('resumeFile');
            const dropZone = document.getElementById('dropZone');
            const fileInfo = document.getElementById('fileInfo');
            const fileNameEl = document.getElementById('fileName');
            const removeBtn = document.getElementById('removeFileBtn');
            const fileError = document.getElementById('fileError');
            const jobTitleErr = document.getElementById('jobTitleError');
            const seniorityErr = document.getElementById('seniorityError');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const statusMsg = document.getElementById('statusMessage');

            const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5 MB
            const ALLOWED_EXTENSIONS = ['.pdf', '.doc', '.docx'];

            let selectedFile = null;

            // ===== Validation =====
            function isJobTitleValid() {
                return jobTitle.value.trim().length > 0 && jobTitle.value.trim().length <= 50;
            }
            function isSeniorityValid() {
                return seniority.value !== '';
            }
            function isFileValid() {
                return selectedFile !== null;
            }

            function validateForm() {
                const allValid = isJobTitleValid() && isSeniorityValid() && isFileValid();
                submitBtn.disabled = !allValid;
            }

            function showFieldError(el, msg) {
                el.textContent = msg;
                el.classList.remove('hidden');
            }
            function hideFieldError(el) {
                el.classList.add('hidden');
            }

            // Live validation listeners
            jobTitle.addEventListener('input', () => {
                const val = jobTitle.value.trim();
                if (val.length === 0) {
                    showFieldError(jobTitleErr, '請輸入目標職缺名稱。');
                } else if (val.length > 50) {
                    showFieldError(jobTitleErr, '職缺名稱不得超過 50 字。');
                } else {
                    hideFieldError(jobTitleErr);
                }
                validateForm();
            });

            seniority.addEventListener('change', () => {
                if (!isSeniorityValid()) {
                    showFieldError(seniorityErr, '請選擇資歷層級。');
                } else {
                    hideFieldError(seniorityErr);
                }
                validateForm();
            });

            // ===== File handling =====
            function validateFile(file) {
                hideFieldError(fileError);

                if (!file) return false;

                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (!ALLOWED_EXTENSIONS.includes(ext)) {
                    showFieldError(fileError, '僅支援 PDF 或 Word (.doc, .docx) 格式。');
                    resetFileUI();
                    return false;
                }

                if (file.size > MAX_FILE_SIZE) {
                    showFieldError(fileError, '檔案大小不得超過 5MB。');
                    resetFileUI();
                    return false;
                }

                return true;
            }

            function setFile(file) {
                if (!validateFile(file)) {
                    selectedFile = null;
                    validateForm();
                    return;
                }
                selectedFile = file;
                fileNameEl.textContent = file.name;
                dropZone.classList.add('hidden');
                fileInfo.classList.remove('hidden');
                fileInfo.classList.add('flex');
                validateForm();
            }

            function resetFileUI() {
                selectedFile = null;
                fileInput.value = '';
                dropZone.classList.remove('hidden');
                fileInfo.classList.add('hidden');
                fileInfo.classList.remove('flex');
                validateForm();
            }

            fileInput.addEventListener('change', (e) => setFile(e.target.files[0]));
            removeBtn.addEventListener('click', () => { hideFieldError(fileError); resetFileUI(); });

            // Drag & drop
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
                dropZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
            });
            ['dragenter', 'dragover'].forEach(evt => {
                dropZone.addEventListener(evt, () => dropZone.classList.add('border-white', 'bg-neutral-800'), false);
            });
            ['dragleave', 'drop'].forEach(evt => {
                dropZone.addEventListener(evt, () => dropZone.classList.remove('border-white', 'bg-neutral-800'), false);
            });
            dropZone.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    fileInput.files = files;
                    setFile(files[0]);
                }
            }, false);

            // ===== Status UI =====
            function showStatus(msg, type = 'info') {
                statusMsg.classList.remove('hidden',
                    'bg-red-900/50', 'border-red-500', 'text-red-200',
                    'bg-green-900/50', 'border-green-500', 'text-green-200',
                    'bg-neutral-800', 'border-neutral-700', 'text-neutral-300');

                if (type === 'error') {
                    statusMsg.classList.add('bg-red-900/50', 'border-red-500', 'text-red-200');
                } else if (type === 'success') {
                    statusMsg.classList.add('bg-green-900/50', 'border-green-500', 'text-green-200');
                } else {
                    statusMsg.classList.add('bg-neutral-800', 'border-neutral-700', 'text-neutral-300');
                }
                statusMsg.textContent = msg;
            }

            function hideStatus() {
                statusMsg.classList.add('hidden');
            }

            // ===== Loading state =====
            function setLoading(on) {
                const fields = form.querySelectorAll('input, select, button, label[for="resumeFile"]');
                fields.forEach(el => {
                    el.disabled = on;
                    if (on) el.classList.add('pointer-events-none');
                    else el.classList.remove('pointer-events-none');
                });

                btnLoader.classList.toggle('hidden', !on);
                btnText.textContent = on
                    ? 'AI 正在為您生成專屬報告，約3-5分鐘再回來頁面查看...'
                    : '開始 AI 分析並下載報告';

                if (on) {
                    submitBtn.disabled = true;
                    dropZone.classList.add('opacity-50', 'cursor-not-allowed');
                    removeBtn.classList.add('hidden');
                } else {
                    dropZone.classList.remove('opacity-50', 'cursor-not-allowed');
                    removeBtn.classList.remove('hidden');
                    validateForm();
                }
            }

            // ===== Fetch with timeout =====
            function fetchWithTimeout(url, options, timeout) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeout);
                return fetch(url, { ...options, signal: controller.signal })
                    .finally(() => clearTimeout(timer));
            }

            // ===== Text extraction =====
            async function extractTextFromFile(file) {
                const ext = file.name.split('.').pop().toLowerCase();

                if (ext === 'pdf') {
                    return await extractPdfText(file);
                } else if (ext === 'doc' || ext === 'docx') {
                    return await extractDocxText(file);
                }
                throw new Error(`不支援的檔案格式: .${ext}`);
            }

            async function extractPdfText(file) {
                const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = '';

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(' ') + '\n';
                }
                return fullText.trim();
            }

            async function extractDocxText(file) {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer });
                return result.value.trim();
            }

            // ===== Submit =====
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Final guard
                if (!isJobTitleValid() || !isSeniorityValid() || !isFileValid()) return;

                // 檢查配額（不扣次數，n8n 成功後才扣）
                const quota = await window.checkQuota();
                if (!quota) return;

                setLoading(true);

                // Step 1: Extract text from file
                showStatus('正在解析履歷檔案內容...', 'info');
                let resumeText = '';
                try {
                    resumeText = await extractTextFromFile(selectedFile);
                } catch (parseErr) {
                    showStatus(`履歷檔案解析失敗：${parseErr.message}`, 'error');
                    setLoading(false);
                    return;
                }

                if (!resumeText || resumeText.trim().length < 20) {
                    showStatus('無法從履歷中提取足夠的文字。請確認檔案非空白、非純圖片掃描檔。', 'error');
                    setLoading(false);
                    return;
                }

                // Step 2: Send to n8n
                showStatus('AI 正在為您生成專屬報告，約3-5分鐘再回來頁面查看...', 'info');

                const formData = new FormData();
                formData.append('jobTitle', jobTitle.value.trim());
                formData.append('seniorityLevel', seniority.value);
                formData.append('resumeText', resumeText);
                formData.append('resumeFile', selectedFile);

                try {
                    const response = await fetchWithTimeout(N8N_WEBHOOK_URL, {
                        method: 'POST',
                        body: formData,
                    }, API_TIMEOUT_MS);

                    const rawText = await response.text();
                    let data = null;
                    if (rawText && rawText.trim()) {
                        try {
                            data = JSON.parse(rawText);
                        } catch (parseErr) {
                            // 非 JSON 回傳
                        }
                    }
                    console.log('Raw API response:', rawText);

                    // 非 2xx：優先顯示 n8n 帶回的 error 訊息
                    if (!response.ok) {
                        const msg = data?.error || `伺服器回應錯誤 (HTTP ${response.status})`;
                        throw new Error(msg);
                    }

                    if (!data) {
                        throw new Error('伺服器回傳空內容或格式錯誤，請稍後再試');
                    }

                    // n8n error 分支回傳 { success: false, error: "..." }
                    if (data.success === false) {
                        throw new Error(data.error || '分析流程失敗');
                    }

                    // Parse results: { results: [...], reportUrl: "..." } or plain array
                    let results, reportUrl;
                    if (data.results) {
                        results = data.results;
                        reportUrl = data.reportUrl || null;
                    } else {
                        results = Array.isArray(data) ? data : [data];
                        reportUrl = null;
                    }
                    console.log('Parsed results[0]:', JSON.stringify(results[0], null, 2));

                    if (!Array.isArray(results) || results.length === 0 || results[0]?.error) {
                        throw new Error(results[0]?.error || '未取得分析結果');
                    }

                    showStatus(`分析完成！共找到 ${results.length} 筆職缺匹配結果。`, 'success');
                    renderResultCards(results, reportUrl);
                    setLoading(false);

                    // 成功才扣次數 + 寫入歷史紀錄
                    await window.consumeQuota(quota.count, results, reportUrl);
                    await window.loadHistory();

                } catch (err) {
                    console.error('API Error:', err);

                    let msg = '系統處理異常，請稍後再試。';
                    if (err.name === 'AbortError') {
                        msg = '請求逾時，後端處理時間過長，請稍後再試。';
                    } else if (err.message) {
                        msg = `系統處理異常：${err.message}`;
                    }

                    showStatus(msg, 'error');
                    setLoading(false);
                    btnText.textContent = '重新嘗試送出';
                }
            });

            // ===== Render result cards =====
            const resultsSection = document.getElementById('resultsSection');
            const resultsCards = document.getElementById('resultsCards');
            const downloadReportBtn = document.getElementById('downloadReportBtn');

            function getScoreBadge(score) {
                const num = parseInt(score) || 0;
                if (num >= 7) return { color: 'bg-emerald-900/50 border-emerald-700 text-emerald-300', label: score };
                if (num >= 5) return { color: 'bg-yellow-900/50 border-yellow-700 text-yellow-300', label: score };
                return { color: 'bg-red-900/50 border-red-700 text-red-300', label: score };
            }

            function renderResultCards(results, reportUrl) {
                resultsCards.innerHTML = '';
                resultsSection.classList.remove('hidden');

                // Download button
                if (reportUrl) {
                    downloadReportBtn.classList.remove('hidden');
                    downloadReportBtn.onclick = () => window.open(reportUrl, '_blank');
                } else {
                    // Fallback: local download
                    downloadReportBtn.classList.remove('hidden');
                    downloadReportBtn.onclick = () => downloadLocalReport(results);
                }

                results.forEach((item, idx) => {
                    const badge = getScoreBadge(item.fit_score);

                    const keywords = (item.keywords || [])
                        .map(k => `<span class="inline-block bg-neutral-800 border border-neutral-700 text-neutral-400 text-xs px-2 py-1 rounded-md">${k}</span>`)
                        .join('');

                    const questions = (item.interview_q || '')
                        .split(/\n/)
                        .filter(q => q.trim())
                        .map(q => `<li class="text-neutral-300">${q.replace(/^\d+\.\s*/, '')}</li>`)
                        .join('');

                    const linkHtml = item.link
                        ? `<a href="${item.link}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors mt-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        LinkedIn 職缺連結
                       </a>`
                        : '';

                    const card = `
                <div class="bg-black border border-neutral-800 rounded-xl overflow-hidden">
                    <!-- Header -->
                    <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-800">
                        <div class="min-w-0 flex-1 mr-3">
                            <p class="text-sm font-bold text-white truncate">${item.title || `#${idx + 1}`}</p>
                            <p class="text-xs text-neutral-400 mt-0.5">${item.companyName || 'N/A'}</p>
                            ${linkHtml}
                        </div>
                        <div class="border rounded-lg px-3 py-1.5 text-sm font-bold flex-shrink-0 ${badge.color}">
                            ${badge.label}
                        </div>
                    </div>

                    <div class="px-5 py-4 space-y-5">
                        <!-- Keywords -->
                        <div>
                            <h4 class="text-xs font-semibold text-neutral-500 uppercase tracking-wider mb-2">匹配關鍵字</h4>
                            <div class="flex flex-wrap gap-1.5">${keywords || '<span class="text-neutral-600 text-sm">N/A</span>'}</div>
                        </div>

                        <!-- Lack -->
                        <div>
                            <h4 class="text-xs font-semibold text-neutral-500 uppercase tracking-wider mb-2">缺乏經驗</h4>
                            <p class="text-sm text-neutral-300 leading-relaxed">${item.lack_exp || 'N/A'}</p>
                        </div>

                        <!-- Improvement -->
                        <div>
                            <h4 class="text-xs font-semibold text-neutral-500 uppercase tracking-wider mb-2">補足建議</h4>
                            <p class="text-sm text-neutral-300 leading-relaxed">${item.improvement || 'N/A'}</p>
                        </div>

                        <!-- Interview Questions -->
                        <div>
                            <h4 class="text-xs font-semibold text-neutral-500 uppercase tracking-wider mb-2">預測面試題目</h4>
                            <ol class="list-decimal list-inside text-sm space-y-1.5">${questions || '<li class="text-neutral-600">N/A</li>'}</ol>
                        </div>

                        <!-- Final Advice -->
                        <div class="bg-neutral-900 border border-neutral-800 rounded-lg p-4">
                            <h4 class="text-xs font-semibold text-neutral-500 uppercase tracking-wider mb-2">綜合建議</h4>
                            <p class="text-sm text-neutral-200 leading-relaxed">${item.final_advice || 'N/A'}</p>
                        </div>
                    </div>
                </div>`;

                    resultsCards.insertAdjacentHTML('beforeend', card);
                });

                // Scroll to results
                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function downloadLocalReport(results) {
                let text = '=== AI 履歷分析報告 ===\n';
                text += `產生時間: ${new Date().toLocaleString('zh-TW')}\n\n`;
                results.forEach((item, idx) => {
                    text += `${'='.repeat(50)}\n`;
                    text += `職缺 #${idx + 1} (ID: ${item.id || 'N/A'})\n`;
                    text += `適配度: ${item.fit_score || 'N/A'}\n\n`;
                    text += `關鍵字: ${(item.keywords || []).join(', ')}\n\n`;
                    text += `缺乏經驗:\n${item.lack_exp || 'N/A'}\n\n`;
                    text += `補足建議:\n${item.improvement || 'N/A'}\n\n`;
                    text += `面試題目:\n${item.interview_q || 'N/A'}\n\n`;
                    text += `綜合建議:\n${item.final_advice || 'N/A'}\n\n`;
                });
                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `AI_履歷分析報告_${new Date().toISOString().slice(0, 10)}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            }
        });
    </script>
</body>

</html>
